<b>carkifelek</b><br>
<canvas id="wheel" width="280" height="280"></canvas>
<button onclick="spin()">cevir</button>
<p id="result"></p>

<script>
const answers = [
  "evet", "hayir", "belki", "imkani yok",
  "belki", "allah bilir", "hasta", "gec"
];

function getAnswer() {
  document.getElementById('answer').textContent = answers[Math.floor(Math.random() * answers.length)];
}

const segments = ["evet", "hayir", "belki", "imkani yok",
  "belki", "allah bilir", "hasta", "gec"];
const colors = ["#ff4444","#44ff44","#4444ff","#ffff44","#ff44ff","#44ffff","#ff8844","#88ff44"];
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const cx = 140, cy = 140, r = 130;
let angle = 0, spinning = false;

function drawWheel(a) {
  const slice = 2 * Math.PI / segments.length;
  for (let i = 0; i < segments.length; i++) {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, a + i*slice, a + (i+1)*slice);
    ctx.fillStyle = colors[i];
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(a + i*slice + slice/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#000';
    ctx.font = 'bold 11px Comic Sans MS';
    ctx.fillText(segments[i], r - 5, 4);
    ctx.restore();
  }
  // pointer
  ctx.beginPath();
  ctx.moveTo(cx + r + 5, cy);
  ctx.lineTo(cx + r - 20, cy - 10);
  ctx.lineTo(cx + r - 20, cy + 10);
  ctx.fillStyle = 'red';
  ctx.fill();
}

drawWheel(0);

function spin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('result').textContent = '';
  const total = (Math.random() * 5 + 6) * 2 * Math.PI;
  const dur = 3500, start = performance.now(), startA = angle;
  function animate(now) {
    const p = Math.min((now - start) / dur, 1);
    const ease = 1 - Math.pow(1 - p, 4);
    angle = startA + total * ease;
    ctx.clearRect(0,0,280,280);
    drawWheel(angle);
    if (p < 1) { requestAnimationFrame(animate); }
    else {
      spinning = false;
      const slice = 2 * Math.PI / segments.length;
      const norm = ((-angle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
      const idx = Math.floor(norm / slice) % segments.length;
      document.getElementById('result').textContent = '>>> ' + segments[idx] + ' <<<';
    }
  }
  requestAnimationFrame(animate);
}
</script>
